spring:
  application:
    name: donaton-ms-logistica
  datasource:
    url: jdbc:h2:mem:logisticadb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

server:
  port: 8082